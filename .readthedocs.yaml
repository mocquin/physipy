# Read the Docs configuration.
# https://docs.readthedocs.io/en/stable/config-file/v2.html
#
# Docs dependencies come from the `docs` dependency group in pyproject.toml
# (single source of truth). We install them with uv and build with mkdocs.
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  jobs:
    install:
      - pip install uv
      - uv sync --group docs
    build:
      html:
        - uv run mkdocs build --site-dir "$READTHEDOCS_OUTPUT/html"
