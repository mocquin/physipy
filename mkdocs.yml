# mkdocs configuration for the physipy documentation.
# Theme: Material for MkDocs. API pages: mkdocstrings (Python handler).
# Built and hosted on Read the Docs (see .readthedocs.yaml).

site_name: "physipy"
site_description: "Official documentation for the physipy Python package."
site_url: https://physipy.readthedocs.io/
repo_url: https://github.com/mocquin/physipy/
repo_name: mocquin/physipy
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: _mkdocks_site
# Emit page.html (not page/index.html) so local file:// browsing works.
use_directory_urls: false

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    logo: material/book
    edit: material/pencil
    view: material/eye
  palette:
    - scheme: default            # light mode
      toggle:
        icon: material/brightness-5
        name: Switch to dark mode
    - scheme: slate              # dark mode
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.top
    - navigation.path
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.edit
    - content.action.view
    - content.code.copy
    - content.code.select

# Rebuild on changes to these when running `mkdocs serve`.
watch: [mkdocs.yml, README.md, physipy]

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            # Parse the prose docstrings as Google-style so Args/Returns/
            # Raises/Examples sections render as tables when present.
            docstring_style: google
            show_submodules: true
            show_source: true
            # Render a clean heading + signature for each documented object.
            show_root_heading: true
            show_root_full_path: false
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            # Group members by kind (classes / functions / attributes) and
            # keep them in source order within each group.
            group_by_category: true
            members_order: source
  # Render the scientific-stack pages straight from their notebooks, using the
  # outputs stored in the .ipynb (execute: false -> fast and deterministic).
  # ignore_h1_titles: use the nav labels, not each notebook's first heading.
  - mkdocs-jupyter:
      execute: false
      ignore_h1_titles: true

markdown_extensions:
  - toc:
      permalink: true
      title: On this page
      toc_depth: 3
  - attr_list
  - markdown_include.include:
      base_path: docs
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.arithmatex:        # LaTeX math (paired with the MathJax script below)
      generic: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quickstart: quickstart.md
  - Values, units & display: values-units-and-display.md
  - Scientific stack support:
      - Standard math module: scientific-stack/math-support.ipynb
      - numpy: scientific-stack/numpy-support.ipynb
      - matplotlib: scientific-stack/matplotlib-support.ipynb
      - pandas: scientific-stack/pandas-support.ipynb
      - scipy: scientific-stack/scipy-support.ipynb
  - Examples:
      - Physics: examples/physics-examples.md
      - Thermal equation (finite differences): examples/thermal-equation-using-fdm.md
      - Fourier transform: examples/fourier-transform-example.md
  - API reference:
      - Introduction: API/api-reference.md
      - Dimension: API/dimension-api.md
      - Quantity: API/quantity-api.md
      - Units: API/units-api.md
      - Constants: API/constants-api.md
      - Plotting: API/plotting-api.md
  - Development:
      - General guidance: development-guide/index.md
      - Benchmarking with asv: development-guide/dev-benchmarking-with-asv.md
      - Performance vs other packages: development-guide/dev-performance-comparison.md
      - Performance of the Dimension class: development-guide/dev-performance-dimension.md
  - Misc:
      - Alternative packages: misc/alternative-packages.md
      - Other value backends:
          - decimal: misc/support-for-other-backend-packages/decimal-support.md
          - handcalcs: misc/support-for-other-backend-packages/handcalcs-support.md
          - mcerp: misc/support-for-other-backend-packages/mcerp-support.md
          - uncertainties: misc/support-for-other-backend-packages/uncertainties-support.md

# MathJax for the arithmatex extension.
extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mocquin
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/physipy/
